# Companies polled directly, grouped by ATS. All slugs verified live
# 2026-07-22/23. To add a company: find its ATS from the careers-page URL, add
# an entry here. New sources seed silently on their first run (no notification
# backlog spam).
#
# tier: 1 (default) = polled every 15 min; tier: 2 = polled every ~30 min.
#
# Microsoft is polled via the bespoke notifier/sources/microsoft.py adapter
# (Eightfold-PCSX API), not from this file.
#
# Own-portal companies we can't poll (covered via the SimplifyJobs baseline):
# Jane Street, Two Sigma, Citadel, Tesla, Uber, Apple, Meta, Google,
# Qualcomm (wd12 Workday tenant is empty; careers.qualcomm.com blocks
# anonymous calls), AMD, EA, ServiceNow, Atlassian (Lever board exists but is
# abandoned/empty), Rippling, Applied Intuition.
# Intuit's Workday tenant requires session tokens (401) — also skipped.
# No public board found for: SIG, PEAK6, Radix Trading.
# Deel/Mercury (Ashby) and Voleon/Kraken (Lever) boards exist but are empty —
# rechecked 2026-07-23; re-add if they come back to life.

