# Companies polled directly, grouped by ATS. All slugs verified live 2026-07-22.
# To add a company: find its ATS from the careers-page URL, add an entry here.
# New sources seed silently on their first run (no notification backlog spam).
#
# tier: 1 (default) = polled every 15 min; tier: 2 = polled every ~30 min.
#
# Own-portal companies we can't poll (covered via the SimplifyJobs baseline):
# Jane Street, Two Sigma, Citadel, Tesla, Uber, Microsoft, Apple, Meta, Google.
# Intuit's Workday tenant requires session tokens (401) — also skipped.

